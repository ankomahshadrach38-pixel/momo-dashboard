<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MoMo Dashboard Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0F1E;
    --surface: #111827;
    --surface2: #1A2235;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #F0F4FF;
    --text2: #8B96B0;
    --text3: #4B5568;
    --mtn: #F59E0B;
    --tel: #EF4444;
    --at: #3B82F6;
    --green: #10B981;
    --accent: #6366F1;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOAST NOTIFICATIONS ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    display: flex; flex-direction: column; gap: 10px; pointer-events: none;
  }
  .toast {
    background: var(--surface2); border: 1px solid var(--border2);
    padding: 14px 20px; border-radius: 12px; color: var(--text);
    font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: slideInUp 0.3s ease forwards;
  }
  .toast.success .toast-icon { color: var(--green); }
  .toast.info .toast-icon { color: var(--accent); }
  @keyframes slideInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeOut { to { opacity:0; transform:translateY(-10px); } }

  /* ── AUTH ── */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px; background: var(--bg);
    background-image: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245,158,11,0.06) 0%, transparent 60%);
    animation: fadeIn 0.5s ease forwards;
  }

  .auth-card {
    width: 100%; max-width: 420px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 24px; padding: 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }

  .auth-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
  .logo-icon {
    width: 46px; height: 46px; border-radius: 14px;
    background: linear-gradient(135deg, #F59E0B, #EF4444);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #fff;
    box-shadow: 0 8px 24px rgba(245,158,11,0.25);
  }
  .auth-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .auth-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .tab-row {
    display: flex; background: var(--surface2); border-radius: 12px;
    padding: 4px; margin-bottom: 24px; border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    background: transparent; color: var(--text2); transition: all 0.2s;
  }
  .tab-btn.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .field-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px; }
  .inp {
    width: 100%; padding: 13px 16px; border-radius: 12px; border: 1.5px solid var(--border2);
    font-size: 14px; color: var(--text); background: var(--surface2);
    outline: none; font-family: var(--sans); transition: all 0.2s;
  }
  .inp::placeholder { color: var(--text3); }
  .inp:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

  .error-msg {
    margin-top: 12px; padding: 10px 14px; background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; font-size: 13px; color: #FCA5A5;
    display: none;
  }
  .error-msg.show { display: block; }

  .btn-primary {
    width: 100%; margin-top: 20px; padding: 14px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff;
    font-size: 14px; font-weight: 600; font-family: var(--sans);
    box-shadow: 0 8px 24px rgba(99,102,241,0.25); transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(99,102,241,0.35); }
  .btn-primary:active { transform: scale(0.98); }

  .auth-switch { margin-top: 20px; font-size: 13px; color: var(--text2); text-align: center; }
  .auth-switch span { color: var(--accent); cursor: pointer; font-weight: 600; transition: color 0.2s; }
  .auth-switch span:hover { color: #818CF8; }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: rgba(17, 24, 39, 0.85); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 70px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg,#F59E0B,#EF4444); display:flex;align-items:center;justify-content:center; font-size:15px;font-weight:700;color:#fff; }
  .header-brand { font-size: 15px; font-weight: 700; }
  .header-biz { font-size: 12px; color: var(--text2); }
  .header-right { display: flex; align-items: center; gap: 16px; }

  .live-badge {
    display: flex; align-items: center; gap: 8px; background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2); border-radius: 10px; padding: 6px 14px;
  }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .live-badge span { font-size: 12px; color: var(--green); font-weight: 600; }

  .header-date { font-size: 13px; color: var(--text3); font-family: var(--mono); }

  .avatar-btn {
    display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 10px;
    border-radius: 12px; border: none; background: transparent; transition: background 0.2s;
  }
  .avatar-btn:hover { background: var(--surface2); }
  .avatar-circle {
    width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#6366F1,#EC4899);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff;
  }
  .avatar-name { font-size: 13px; font-weight: 600; color: var(--text); text-align: left;}
  .avatar-sub { font-size: 11px; color: var(--text2); text-align: left; }

  .btn-signout {
    padding: 8px 16px; border: 1px solid var(--border2); border-radius: 10px;
    background: transparent; color: var(--text2); font-size: 13px;
    cursor: pointer; font-family: var(--sans); font-weight: 500; transition: all 0.2s;
  }
  .btn-signout:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

  /* ── MAIN ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; width: 100%; }

  /* ── FILTERS ── */
  .filters { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .period-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 12px; padding: 4px; border: 1px solid var(--border); }
  .period-tab {
    padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer;
    background: transparent; color: var(--text2); font-size: 13px; font-family: var(--sans); font-weight: 500; transition: all 0.2s;
  }
  .period-tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

  .net-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .net-btn {
    padding: 7px 16px; border-radius: 10px; border: 1.5px solid var(--border2);
    background: transparent; color: var(--text2); font-size: 13px; cursor: pointer;
    font-family: var(--sans); font-weight: 500; transition: all 0.2s;
  }
  .net-btn:hover { border-color: var(--text3); color: var(--text); }
  .net-btn.active-all { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }
  .net-btn.active-mtn { background: rgba(245,158,11,0.15); color: var(--mtn); border-color: var(--mtn); font-weight: 600; }
  .net-btn.active-tel { background: rgba(239,68,68,0.15); color: var(--tel); border-color: var(--tel); font-weight: 600; }
  .net-btn.active-at  { background: rgba(59,130,246,0.15); color: var(--at); border-color: var(--at); font-weight: 600; }

  /* ── METRIC CARDS ── */
  .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 24px; }
  .metric-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px;
    display: flex; flex-direction: column; opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.5s ease forwards; transition: border-color 0.2s, transform 0.2s;
  }
  .metric-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .metric-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .metric-val { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; font-family: var(--mono); }
  .metric-sub { font-size: 12px; margin-bottom: 16px; }
  .metric-spark { margin-top: auto; }

  /* ── MAIN GRID ── */
  .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px;
    opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s ease forwards;
  }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }

  /* ── TABLE ── */
  .txn-table-wrap { overflow-y: auto; max-height: 480px; padding-right: 4px; }
  .txn-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: -8px; }
  .txn-table thead th {
    padding: 0 12px 12px; font-size: 11px; color: var(--text3); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border);
  }
  .txn-table thead th:nth-child(3), .txn-table thead th:nth-child(5) { text-align: right; }
  .txn-table tbody tr { background: var(--surface2); transition: transform 0.2s, background 0.2s; }
  .txn-table tbody tr:hover { background: rgba(255,255,255,0.04); transform: scale(1.01); }
  .txn-table td { padding: 12px; }
  .txn-table td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
  .txn-table td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

  .txn-avatar {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .txn-name { font-size: 14px; font-weight: 500; }
  .txn-phone { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }
  .net-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
  .amt { font-size: 14px; font-weight: 600; font-family: var(--mono); text-align: right; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }
  .time-cell { font-size: 12px; color: var(--text3); font-family: var(--mono); text-align: right; }

  .new-txn { animation: highlightRow 2s ease forwards; }
  @keyframes highlightRow { 0% { background: rgba(16,185,129,0.2); } 100% { background: var(--surface2); } }

  /* ── RIGHT COLUMN ── */
  .right-col { display: flex; flex-direction: column; gap: 16px; }

  /* ── DONUT ── */
  .donut-row { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 10px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 13px; color: var(--text2); flex: 1; }
  .legend-pct { font-size: 14px; font-weight: 700; font-family: var(--mono); }

  /* ── BAR CHART ── */
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { width: 72px; font-size: 12px; color: var(--text2); flex-shrink: 0; }
  .bar-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .bar-val { width: 64px; font-size: 12px; font-weight: 600; font-family: var(--mono); text-align: right; flex-shrink: 0; }

  /* ── ALERTS ── */
  .alerts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .crit-badge { font-size: 11px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; padding: 4px 10px; border-radius: 6px; font-weight: 600; }
  .alert-item {
    display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 12px;
    border-left: 3px solid transparent; margin-bottom: 8px; background: var(--surface2);
  }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .alert-msg { font-size: 13px; color: var(--text); line-height: 1.5; }
  .alert-time { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

  /* ── RECONCILIATION ── */
  .recon-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .recon-label { width: 76px; font-size: 13px; color: var(--text2); flex-shrink: 0; }
  .recon-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .recon-fill { height: 100%; border-radius: 99px; }
  .recon-val { width: 80px; font-size: 12px; font-weight: 600; font-family: var(--mono); text-align: right; flex-shrink: 0; }

  /* ── PROFILE MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 24px;
    padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .modal-overlay.show .modal-box { transform: translateY(0); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
  .field-label { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .modal-field { margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 12px; margin-top: 24px; }
  .btn-cancel {
    flex: 1; padding: 12px; border: 1px solid var(--border2); border-radius: 12px;
    background: transparent; color: var(--text2); font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: var(--sans); transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--text3); background: var(--surface2); }
  .btn-save {
    flex: 2; padding: 12px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.9; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4);} 50%{box-shadow:0 0 0 6px rgba(16,185,129,0);} }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── RESPONSIVE ── */
  @media (max-width: 960px) { .main-grid { grid-template-columns: 1fr; } .metric-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .metric-grid { grid-template-columns: 1fr; } .header { padding: 0 20px; } .header-date { display: none; } }
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">₵</div>
      <div>
        <div class="auth-title">MoMo Dashboard Pro</div>
        <div class="auth-sub">Enterprise Mobile Money Analytics</div>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchMode('login')">Sign in</button>
      <button class="tab-btn" id="tab-register" onclick="switchMode('register')">Create account</button>
    </div>

    <div class="field-group" id="register-fields" style="display:none">
      <input class="inp" id="inp-name" placeholder="Full Name (e.g. John Doe)"/>
      <input class="inp" id="inp-business" placeholder="Business Name"/>
      <input class="inp" id="inp-city" placeholder="City (e.g. Accra)"/>
    </div>
    <div class="field-group">
      <input class="inp" id="inp-username" placeholder="Username" onkeydown="if(event.key==='Enter')doAuth()"/>
      <input class="inp" id="inp-password" placeholder="Password" type="password" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>

    <div class="error-msg" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Sign in →</button>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="header-logo">₵</div>
      <div>
        <div class="header-brand">MoMo Dashboard</div>
        <div class="header-biz" id="hdr-biz">— · —</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge" title="Live connection active">
        <div class="live-dot"></div><span>Live</span>
      </div>
      <span class="header-date" id="hdr-date"></span>
      <button class="avatar-btn" onclick="openProfile()">
        <div class="avatar-circle" id="hdr-avatar">?</div>
        <div>
          <div class="avatar-name" id="hdr-name">—</div>
          <div class="avatar-sub">Settings</div>
        </div>
      </button>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <main class="main">
    <div class="filters">
      <div class="period-tabs">
        <button class="period-tab active" onclick="setPeriod(this,'today')">Today</button>
        <button class="period-tab" onclick="setPeriod(this,'week')">This week</button>
        <button class="period-tab" onclick="setPeriod(this,'month')">This month</button>
      </div>
      <div class="net-filters" id="net-filters">
        <button class="net-btn active-all" data-net="ALL" onclick="setNet(this)">All networks</button>
        <button class="net-btn" data-net="MTN" onclick="setNet(this)">MTN MoMo</button>
        <button class="net-btn" data-net="TELECEL" onclick="setNet(this)">Telecel Cash</button>
        <button class="net-btn" data-net="AT" onclick="setNet(this)">AT Money</button>
      </div>
    </div>

    <div class="metric-grid" id="metric-grid"></div>

    <div class="main-grid">
      <div class="card" style="animation-delay:200ms; overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <div class="card-title" style="margin-bottom:0">Live Transaction Feed</div>
          <span style="font-size:12px;color:var(--text3);font-weight:600;" id="txn-count"></span>
        </div>
        <div class="txn-table-wrap">
          <table class="txn-table">
            <thead>
              <tr>
                <th style="text-align:left">Customer</th>
                <th style="text-align:left">Network</th>
                <th style="text-align:right">Amount</th>
                <th style="text-align:left">Status</th>
                <th style="text-align:right">Time</th>
              </tr>
            </thead>
            <tbody id="txn-body"></tbody>
          </table>
        </div>
      </div>

      <div class="right-col">
        <div class="card" style="animation-delay:300ms">
          <div class="card-title">Network Split</div>
          <div class="donut-row">
            <svg id="donut-svg" width="120" height="120" viewBox="0 0 120 120"></svg>
            <div class="donut-legend" id="donut-legend"></div>
          </div>
          <div id="bar-chart"></div>
        </div>

        <div class="card" style="animation-delay:400ms">
          <div class="alerts-header">
            <div class="card-title" style="margin-bottom:0">System Alerts</div>
            <span class="crit-badge" id="alert-badge">System Normal</span>
          </div>
          <div id="alerts-list"></div>
        </div>

        <div class="card" style="animation-delay:500ms">
          <div class="card-title">Live Reconciliation</div>
          <div id="recon-list"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="profile-modal" onclick="closeProfile(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Account Settings</div>
    <div class="modal-field">
      <div class="field-label">Full name</div>
      <input class="inp" id="m-name" placeholder="Your name"/>
    </div>
    <div class="modal-field">
      <div class="field-label">Business Name</div>
      <input class="inp" id="m-business" placeholder="Business name"/>
    </div>
    <div class="modal-field">
      <div class="field-label">Location (City)</div>
      <input class="inp" id="m-city" placeholder="City"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeProfile()">Cancel</button>
      <button class="btn-save" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════ CONSTANTS & DATA ══════════════════════════
const NETWORKS = {
  MTN:     { label:"MTN MoMo",    color:"#F59E0B", bg:"rgba(245,158,11,0.15)",  text:"#F59E0B", short:"MTN" },
  TELECEL: { label:"Telecel Cash",color:"#EF4444", bg:"rgba(239,68,68,0.15)",   text:"#EF4444", short:"TEL" },
  AT:      { label:"AT Money",    color:"#3B82F6", bg:"rgba(59,130,246,0.15)",  text:"#3B82F6", short:"AT"  },
};
const STATUSES = {
  settled:{ label:"Settled", color:"#10B981", bg:"rgba(16,185,129,0.15)" },
  pending:{ label:"Pending", color:"#F59E0B", bg:"rgba(245,158,11,0.15)" },
  failed: { label:"Failed",  color:"#EF4444", bg:"rgba(239,68,68,0.15)"  },
};
const FIRST = ["Abena","Kwame","Yaa","Fiifi","Ama","Kofi","Akosua","Nana","Efua","Kojo","Adwoa","Kweku","Afia","Kwabena","Esi"];
const LAST  = ["Mensah","Ofori","Asantewaa","Baah","Darko","Boateng","Frimpong","Asante","Poku","Antwi","Owusu","Yeboah","Acheampong","Asamoah","Nyarko"];

const SPARKDATA = {
  total:  [690,900,630,1140,1010,1290,1180,1440,1310,1640,1520,1750],
  count:  [4,6,5,8,7,9,8,10,9,11,10,12],
  avg:    [72,68,75,70,74,73,76,74,77,75,78,76],
  failed: [1,0,2,1,0,1,2,1,0,2,1,2],
};

// ══════════════════════════ STATE & STORAGE ══════════════════════════
let users = JSON.parse(localStorage.getItem("momo_users")) || {};
let session = null;
let currentNet = "ALL";
let allTxns = [];
let liveSimInterval = null;

function saveUsers() { localStorage.setItem("momo_users", JSON.stringify(users)); }

// ══════════════════════════ UTILS ══════════════════════════
function showToast(msg, type="info") {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${type==="success"?"✓":"ℹ"}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = "fadeOut 0.3s ease forwards";
    setTimeout(()=>toast.remove(), 300);
  }, 4000);
}

function randItem(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function fmtTime(d) { return d.toLocaleTimeString("en-GH",{hour:"2-digit",minute:"2-digit"}); }
function fmtDate(d) { return d.toLocaleDateString("en-GH",{weekday:"short",day:"numeric",month:"short",year:"numeric"}); }
function fmt(n) { return n>=1000?`GH₵${(n/1000).toFixed(1)}k`:`GH₵${n}`; }
function initials(name) { return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }

function createRandomTxn(isLive = false) {
  const net = randItem(["MTN","MTN","MTN","MTN","TELECEL","TELECEL","AT"]);
  const status = randItem(["settled","settled","settled","settled","settled","pending","failed"]);
  const amt = Math.round((Math.random()*480+20)/5)*5;
  const name = `${randItem(FIRST)} ${randItem(LAST)}`;
  const prefix = net==="MTN"?"24":net==="TELECEL"?"50":"26";
  const phone = `+233 ${prefix} ··· ${String(Math.floor(Math.random()*9000)+1000)}`;
  return {
    id: `TX${Date.now()}${Math.floor(Math.random()*100)}`,
    name, phone, network: net, status, amount: amt, time: new Date(), isNew: isLive
  };
}

function generateInitialTxns() {
  const txns = [];
  const now = Date.now();
  for (let i=0; i<40; i++) {
    const t = createRandomTxn();
    t.time = new Date(now - (i * 15 + Math.random()*10) * 60000); // spread in past
    txns.push(t);
  }
  return txns.sort((a,b)=>b.time - a.time);
}

// ══════════════════════════ AUTH ══════════════════════════
let authMode = "login";

function switchMode(m) {
  authMode = m;
  document.getElementById("tab-login").classList.toggle("active", m==="login");
  document.getElementById("tab-register").classList.toggle("active", m==="register");
  document.getElementById("register-fields").style.display = m==="register" ? "flex" : "none";
  document.getElementById("auth-btn").textContent = m==="login" ? "Sign in →" : "Create account →";
  document.getElementById("auth-error").classList.remove("show");
}

function doAuth() {
  const user = document.getElementById("inp-username").value.trim();
  const pass = document.getElementById("inp-password").value.trim();
  const err = document.getElementById("auth-error");
  err.classList.remove("show");

  if (!user || !pass) { err.textContent="Fields required."; err.classList.add("show"); return; }

  if (authMode === "register") {
    const name = document.getElementById("inp-name").value.trim();
    const biz = document.getElementById("inp-business").value.trim();
    const city = document.getElementById("inp-city").value.trim() || "Accra";
    if (!name || !biz) { err.textContent="Fields required."; err.classList.add("show"); return; }
    if (users[user]) { err.textContent="Username taken."; err.classList.add("show"); return; }
    
    users[user] = { username:user, password:pass, name, business:biz, city };
    saveUsers();
    showToast("Account created successfully!", "success");
    launchApp(users[user]);
  } else {
    const u = users[user];
    if (!u || u.password !== pass) { err.textContent="Invalid credentials."; err.classList.add("show"); return; }
    showToast("Welcome back!", "success");
    launchApp(u);
  }
}

// Auto-login if previously active
window.onload = () => {
  const activeUser = localStorage.getItem("momo_active_user");
  if(activeUser && users[activeUser]) launchApp(users[activeUser]);
};

// ══════════════════════════ APP ══════════════════════════
function launchApp(u) {
  session = u;
  localStorage.setItem("momo_active_user", u.username);
  allTxns = generateInitialTxns();
  
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";

  // Update Header
  document.getElementById("hdr-biz").textContent = `${u.business} · ${u.city}`;
  document.getElementById("hdr-date").textContent = fmtDate(new Date());
  document.getElementById("hdr-name").textContent = u.name.split(" ")[0];
  document.getElementById("hdr-avatar").textContent = initials(u.name);

  renderDashboard();
  startLiveSimulation();
}

function signOut() {
  session = null;
  localStorage.removeItem("momo_active_user");
  clearInterval(liveSimInterval);
  
  document.getElementById("app").style.display = "none";
  document.getElementById("auth-screen").style.display = "flex";
  
  // Clear inputs
  document.querySelectorAll(".inp").forEach(el => el.value="");
  document.getElementById("inp-city").value="Accra";
  showToast("Signed out successfully.");
}

function startLiveSimulation() {
  if (liveSimInterval) clearInterval(liveSimInterval);
  // Generate a new transaction every 6 to 12 seconds
  liveSimInterval = setInterval(() => {
    if(!session) return;
    const newTxn = createRandomTxn(true);
    allTxns.unshift(newTxn);
    if(allTxns.length > 200) allTxns.pop(); // keep array manageable
    
    if (currentNet === "ALL" || newTxn.network === currentNet) {
        showToast(`New ${NETWORKS[newTxn.network].short} payment: GH₵ ${newTxn.amount}`, "success");
        renderDashboard();
    }
  }, Math.random() * 6000 + 6000);
}

function setPeriod(btn, p) {
  document.querySelectorAll(".period-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderDashboard();
}

function setNet(btn) {
  document.querySelectorAll(".net-btn").forEach(b=>b.className="net-btn");
  currentNet = btn.dataset.net;
  if(currentNet==="ALL") btn.classList.add("active-all");
  else if(currentNet==="MTN") btn.classList.add("active-mtn");
  else if(currentNet==="TELECEL") btn.classList.add("active-tel");
  else if(currentNet==="AT") btn.classList.add("active-at");
  renderDashboard();
}

// ══════════════════════════ RENDER ══════════════════════════
function calcMetrics(txns) {
  const settled = txns.filter(t=>t.status==="settled");
  const total = settled.reduce((s,t)=>s+t.amount,0);
  const failed = txns.filter(t=>t.status==="failed").length;
  const avg = settled.length ? total/settled.length : 0;
  const net={MTN:0,TELECEL:0,AT:0}, netCount={MTN:0,TELECEL:0,AT:0};
  settled.forEach(t=>net[t.network]+=t.amount);
  txns.forEach(t=>netCount[t.network]++);
  return {total,count:txns.length,failed,avg,net,netCount};
}

function renderDashboard() {
  const filtered = currentNet==="ALL" ? allTxns : allTxns.filter(t=>t.network===currentNet);
  const m = calcMetrics(filtered);
  renderMetrics(m);
  renderTxns(filtered);
  renderDonut(m);
  renderBarChart(m);
  renderAlerts();
  renderRecon(m);
  
  // Clean up "isNew" flag so it doesn't animate twice
  filtered.forEach(t => t.isNew = false);
}

function sparklineSVG(data, color, w=120, h=36) {
  const max = Math.max(...data, 1);
  const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-(v/max)*h}`).join(" ");
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block; overflow:visible">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderMetrics(m) {
  const cards = [
    { label:"Total Volume", val:`GH₵ ${m.total.toLocaleString("en-GH")}`, sub:"Live updating", subColor:"#10B981", spark:SPARKDATA.total, sc:"#6366F1", delay:0 },
    { label:"Transactions", val:m.count, sub:"Total attempts today", subColor:"#8B96B0", spark:SPARKDATA.count, sc:"#3B82F6", delay:50 },
    { label:"Avg. Ticket",  val:`GH₵ ${m.avg.toFixed(0)}`, sub:"Across all networks", subColor:"#8B96B0", spark:SPARKDATA.avg, sc:"#F59E0B", delay:100 },
    { label:"Failed Txns",  val:m.failed, sub:m.failed>2?"Attention required":"Normal failure rate", subColor:m.failed>2?"#EF4444":"#10B981", spark:SPARKDATA.failed, sc:"#EF4444", delay:150 },
  ];
  document.getElementById("metric-grid").innerHTML = cards.map(c=>`
    <div class="metric-card" style="animation-delay:${c.delay}ms">
      <div class="metric-label">${c.label}</div>
      <div class="metric-val">${c.val}</div>
      <div class="metric-sub" style="color:${c.subColor}">${c.sub}</div>
      <div class="metric-spark">${sparklineSVG(c.spark,c.sc)}</div>
    </div>
  `).join("");
}

function renderTxns(txns) {
  document.getElementById("txn-count").textContent = `${txns.length} records`;
  document.getElementById("txn-body").innerHTML = txns.slice(0,20).map((tx,i)=>{
    const net=NETWORKS[tx.network], st=STATUSES[tx.status];
    const ini = tx.name.split(" ").map(w=>w[0]).join("").slice(0,2);
    const highlight = tx.isNew ? "new-txn" : "";
    return `<tr class="${highlight}">
      <td>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="txn-avatar" style="background:${net.bg};color:${net.text}">${ini}</div>
          <div>
            <div class="txn-name">${tx.name}</div>
            <div class="txn-phone">${tx.phone}</div>
          </div>
        </div>
      </td>
      <td><span class="net-badge" style="background:${net.bg};color:${net.text}">${net.short}</span></td>
      <td class="amt" style="color:${tx.status==='failed'?'#EF4444':'var(--text)'}">${tx.status==='failed'?'—':`GH₵ ${tx.amount}`}</td>
      <td><span class="status-badge" style="background:${st.bg};color:${st.color}">${st.label}</span></td>
      <td class="time-cell">${fmtTime(tx.time)}</td>
    </tr>`;
  }).join("");
}

function renderDonut(m) {
  const data = [
    {label:"MTN",    value:m.netCount.MTN,     color:NETWORKS.MTN.color},
    {label:"TELECEL",value:m.netCount.TELECEL,  color:NETWORKS.TELECEL.color},
    {label:"AT",     value:m.netCount.AT,       color:NETWORKS.AT.color},
  ];
  const total = data.reduce((s,d)=>s+d.value,0);
  const cx=60,cy=60,r=45,sw=16;
  let cum=0;
  const paths = data.map(d=>{
    const pct=total?d.value/total:0;
    if(pct===0) return "";
    const sa=cum*2*Math.PI-Math.PI/2, ea=(cum+pct)*2*Math.PI-Math.PI/2;
    cum+=pct;
    const laf=pct>0.5?1:0;
    // Handle full circle edge case
    if(pct === 1) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}"/>`;
    return `<path d="M ${cx+r*Math.cos(sa)} ${cy+r*Math.sin(sa)} A ${r} ${r} 0 ${laf} 1 ${cx+r*Math.cos(ea)} ${cy+r*Math.sin(ea)}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-linecap="butt"/>`;
  }).join("");

  document.getElementById("donut-svg").innerHTML = `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="${sw}"/>
    ${paths}
    <text x="${cx}" y="${cy-6}"  text-anchor="middle" font-size="11" fill="#8B96B0" font-family="Space Grotesk,sans-serif">Total</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="16" font-weight="700" fill="#F0F4FF" font-family="JetBrains Mono,monospace">${total}</text>
  `;

  document.getElementById("donut-legend").innerHTML = data.map(d=>{
    const pct = total ? Math.round((d.value/total)*100) : 0;
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${d.color}"></div>
      <span class="legend-label">${NETWORKS[d.label]?.label||d.label}</span>
      <span class="legend-pct" style="color:${d.color}">${pct}%</span>
    </div>`;
  }).join("");
}

function renderBarChart(m) {
  const bars = [
    {label:"MTN MoMo", value:m.net.MTN,    color:NETWORKS.MTN.color},
    {label:"Telecel",  value:m.net.TELECEL, color:NETWORKS.TELECEL.color},
    {label:"AT Money", value:m.net.AT,      color:NETWORKS.AT.color},
  ];
  const max = Math.max(...bars.map(b=>b.value), 1);
  document.getElementById("bar-chart").innerHTML = bars.map(b=>`
    <div class="bar-row">
      <span class="bar-label">${b.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(b.value/max)*100}%;background:${b.color}"></div></div>
      <span class="bar-val" style="color:${b.color}">${fmt(b.value)}</span>
    </div>
  `).join("");
}

function renderAlerts() {
  const alerts = [
    { color:"#10B981", bg:"rgba(16,185,129,0.1)", msg:"Live endpoint connection stable" },
    { color:"#3B82F6", bg:"var(--surface2)", msg:"Settlement batch #402 dispatched" },
  ];
  document.getElementById("alerts-list").innerHTML = alerts.map((a,i)=>`
    <div class="alert-item" style="border-left-color:${a.color}; background:${a.bg}">
      <div class="alert-dot" style="background:${a.color}"></div>
      <div><div class="alert-msg">${a.msg}</div><div class="alert-time">Just now</div></div>
    </div>
  `).join("");
}

function renderRecon(m) {
  const rows = [
    {label:"Matched",   val:`GH₵ ${(m.total*0.96).toFixed(0)}`, pct:96, color:"#10B981"},
    {label:"Pending",   val:`GH₵ ${(m.total*0.03).toFixed(0)}`, pct:3,  color:"#F59E0B"},
    {label:"Exceptions",val:`GH₵ ${(m.total*0.01).toFixed(0)}`, pct:1,  color:"#EF4444"},
  ];
  document.getElementById("recon-list").innerHTML = rows.map(r=>`
    <div class="recon-row">
      <span class="recon-label">${r.label}</span>
      <div class="recon-track"><div class="recon-fill" style="width:${r.pct}%;background:${r.color}"></div></div>
      <span class="recon-val" style="color:${r.color}">${r.val}</span>
    </div>
  `).join("");
}

// ══════════════════════════ PROFILE ══════════════════════════
function openProfile() {
  document.getElementById("m-name").value = session.name;
  document.getElementById("m-business").value = session.business;
  document.getElementById("m-city").value = session.city || "Accra";
  document.getElementById("profile-modal").classList.add("show");
}

function closeProfile(e) {
  if(e && e.target !== document.getElementById("profile-modal")) return;
  document.getElementById("profile-modal").classList.remove("show");
}

function saveProfile() {
  const name = document.getElementById("m-name").value.trim() || session.name;
  const business = document.getElementById("m-business").value.trim() || session.business;
  const city = document.getElementById("m-city").value.trim() || session.city;

  session = { ...session, name, business, city };
  users[session.username] = session;
  saveUsers();

  document.getElementById("hdr-biz").textContent = `${business} · ${city}`;
  document.getElementById("hdr-name").textContent = name.split(" ")[0];
  document.getElementById("hdr-avatar").textContent = initials(name);

  closeProfile();
  showToast("Profile settings saved", "success");
}
</script>
</body>
</html>
