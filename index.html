<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MoMo Vendor Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0F1E;
    --surface: #111827;
    --surface2: #1A2235;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #F0F4FF;
    --text2: #8B96B0;
    --text3: #4B5568;
    --mtn: #F59E0B;
    --tel: #EF4444;
    --at: #3B82F6;
    --green: #10B981;
    --accent: #6366F1;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ── TOAST NOTIFICATIONS ── */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  .toast { background: var(--surface2); border: 1px solid var(--border2); padding: 14px 20px; border-radius: 12px; color: var(--text); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideInUp 0.3s ease forwards; }
  .toast.success .toast-icon { color: var(--green); }
  @keyframes slideInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeOut { to { opacity:0; transform:translateY(-10px); } }

  /* ── AUTH ── */
  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); animation: fadeIn 0.5s ease forwards; }
  .auth-card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border2); border-radius: 24px; padding: 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
  .auth-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
  .logo-icon { width: 46px; height: 46px; border-radius: 14px; background: linear-gradient(135deg, #F59E0B, #EF4444); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; box-shadow: 0 8px 24px rgba(245,158,11,0.25); }
  .auth-title { font-size: 18px; font-weight: 700; }
  .auth-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .tab-row { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; background: transparent; color: var(--text2); transition: all 0.2s; }
  .tab-btn.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .field-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px; }
  .inp { width: 100%; padding: 13px 16px; border-radius: 12px; border: 1.5px solid var(--border2); font-size: 14px; color: var(--text); background: var(--surface2); outline: none; font-family: var(--sans); transition: all 0.2s; }
  .inp::placeholder { color: var(--text3); }
  .inp:focus { border-color: var(--accent); background: var(--surface); }
  .error-msg { margin-top: 12px; padding: 10px 14px; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; font-size: 13px; color: #FCA5A5; display: none; }
  .error-msg.show { display: block; }
  .btn-primary { width: 100%; margin-top: 20px; padding: 14px; border-radius: 12px; border: none; cursor: pointer; background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; font-size: 14px; font-weight: 600; font-family: var(--sans); transition: all 0.2s; }
  .btn-primary:hover { opacity: 0.9; }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  .header { background: rgba(17, 24, 39, 0.85); border-bottom: 1px solid var(--border); padding: 0 32px; height: 70px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg,#F59E0B,#EF4444); display:flex;align-items:center;justify-content:center; font-size:15px;font-weight:700;color:#fff; }
  .header-brand { font-size: 15px; font-weight: 700; }
  .header-biz { font-size: 12px; color: var(--text2); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .btn-add { display: flex; align-items: center; gap: 8px; background: var(--green); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-family: var(--sans); font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; }
  .btn-add:hover { filter: brightness(1.1); }
  .btn-signout { padding: 8px 16px; border: 1px solid var(--border2); border-radius: 10px; background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--sans); font-weight: 500; transition: all 0.2s; }
  .btn-signout:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

  /* ── MAIN ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; width: 100%; }
  .filters { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .net-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .net-btn { padding: 7px 16px; border-radius: 10px; border: 1.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--sans); font-weight: 500; transition: all 0.2s; }
  .net-btn:hover { border-color: var(--text3); color: var(--text); }
  .net-btn.active-all { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }
  .net-btn.active-mtn { background: rgba(245,158,11,0.15); color: var(--mtn); border-color: var(--mtn); font-weight: 600; }
  .net-btn.active-tel { background: rgba(239,68,68,0.15); color: var(--tel); border-color: var(--tel); font-weight: 600; }
  .net-btn.active-at  { background: rgba(59,130,246,0.15); color: var(--at); border-color: var(--at); font-weight: 600; }

  /* ── METRIC CARDS ── */
  .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; }
  .metric-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .metric-val { font-size: 26px; font-weight: 700; margin-bottom: 6px; font-family: var(--mono); }
  .metric-sub { font-size: 12px; }

  /* ── MAIN GRID ── */
  .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }

  /* ── TABLE ── */
  .txn-table-wrap { overflow-y: auto; max-height: 480px; padding-right: 4px; }
  .txn-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: -8px; }
  .txn-table thead th { padding: 0 12px 12px; font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); text-align: left;}
  .txn-table thead th.right { text-align: right; }
  .txn-table tbody tr { background: var(--surface2); }
  .txn-table td { padding: 12px; }
  .txn-table td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
  .txn-table td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }
  .txn-phone { font-size: 14px; font-weight: 600; font-family: var(--mono); }
  .txn-name { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .net-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
  .amt { font-size: 14px; font-weight: 600; font-family: var(--mono); text-align: right; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }
  .time-cell { font-size: 12px; color: var(--text3); font-family: var(--mono); text-align: right; }

  /* ── RIGHT COLUMN ── */
  .right-col { display: flex; flex-direction: column; gap: 16px; }
  .donut-row { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 10px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 13px; color: var(--text2); flex: 1; }
  .legend-pct { font-size: 14px; font-weight: 700; font-family: var(--mono); }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { width: 72px; font-size: 12px; color: var(--text2); flex-shrink: 0; }
  .bar-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
  .bar-val { width: 64px; font-size: 12px; font-weight: 600; font-family: var(--mono); text-align: right; flex-shrink: 0; }

  /* ── MODALS ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 24px; padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.show .modal-box { transform: translateY(0); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
  .field-label { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .modal-field { margin-bottom: 16px; }
  
  select.inp { appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238B96B0%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 16px top 50%; background-size: 10px auto; }
  
  .modal-btns { display: flex; gap: 12px; margin-top: 24px; }
  .btn-cancel { flex: 1; padding: 12px; border: 1px solid var(--border2); border-radius: 12px; background: transparent; color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--sans); }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save { flex: 2; padding: 12px; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--sans); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">₵</div>
      <div>
        <div class="auth-title">MoMo Vendor Tracker</div>
        <div class="auth-sub">Manage your actual transactions</div>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchMode('login')">Sign in</button>
      <button class="tab-btn" id="tab-register" onclick="switchMode('register')">Create account</button>
    </div>

    <div class="field-group" id="register-fields" style="display:none">
      <input class="inp" id="inp-business" placeholder="Business / Vendor Name"/>
    </div>
    <div class="field-group">
      <input class="inp" id="inp-username" placeholder="Username" onkeydown="if(event.key==='Enter')doAuth()"/>
      <input class="inp" id="inp-password" placeholder="Password" type="password" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>

    <div class="error-msg" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Sign in →</button>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="header-logo">₵</div>
      <div>
        <div class="header-brand">MoMo Tracker</div>
        <div class="header-biz" id="hdr-biz">—</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-add" onclick="openAddModal()">➕ Add Transaction</button>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <main class="main">
    <div class="filters">
      <div class="net-filters" id="net-filters">
        <button class="net-btn active-all" data-net="ALL" onclick="setNet(this)">All Networks</button>
        <button class="net-btn" data-net="MTN" onclick="setNet(this)">MTN MoMo</button>
        <button class="net-btn" data-net="TELECEL" onclick="setNet(this)">Telecel Cash</button>
        <button class="net-btn" data-net="AT" onclick="setNet(this)">AT Money</button>
      </div>
    </div>

    <div class="metric-grid" id="metric-grid"></div>

    <div class="main-grid">
      <div class="card" style="overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <div class="card-title" style="margin-bottom:0">Transaction Log</div>
          <span style="font-size:12px;color:var(--text3);font-weight:600;" id="txn-count"></span>
        </div>
        <div class="txn-table-wrap">
          <table class="txn-table">
            <thead>
              <tr>
                <th>Customer / Number</th>
                <th>Network</th>
                <th class="right">Amount</th>
                <th>Status</th>
                <th class="right">Time</th>
              </tr>
            </thead>
            <tbody id="txn-body"></tbody>
          </table>
        </div>
      </div>

      <div class="right-col">
        <div class="card">
          <div class="card-title">Network Split</div>
          <div class="donut-row">
            <svg id="donut-svg" width="120" height="120" viewBox="0 0 120 120"></svg>
            <div class="donut-legend" id="donut-legend"></div>
          </div>
          <div id="bar-chart"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Record Transaction</div>
    <div class="modal-field">
      <div class="field-label">Customer Phone Number</div>
      <input class="inp" id="new-phone" placeholder="e.g. 024XXXXXXX" type="tel"/>
    </div>
    <div class="modal-field">
      <div class="field-label">Customer Name (Optional)</div>
      <input class="inp" id="new-name" placeholder="Leave blank if unknown"/>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px">
      <div class="modal-field">
        <div class="field-label">Amount (GH₵)</div>
        <input class="inp" id="new-amt" placeholder="0.00" type="number" step="0.01" min="0"/>
      </div>
      <div class="modal-field">
        <div class="field-label">Network</div>
        <select class="inp" id="new-net">
          <option value="MTN">MTN MoMo</option>
          <option value="TELECEL">Telecel Cash</option>
          <option value="AT">AT Money</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <div class="field-label">Status</div>
      <select class="inp" id="new-status">
        <option value="settled">Settled (Successful)</option>
        <option value="pending">Pending</option>
        <option value="failed">Failed</option>
      </select>
    </div>
    <div class="error-msg" id="add-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveTransaction()">Save Transaction</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════ CONSTANTS ══════════════════════════
const NETWORKS = {
  MTN:     { label:"MTN MoMo",    color:"#F59E0B", bg:"rgba(245,158,11,0.15)",  text:"#F59E0B", short:"MTN" },
  TELECEL: { label:"Telecel Cash",color:"#EF4444", bg:"rgba(239,68,68,0.15)",   text:"#EF4444", short:"TEL" },
  AT:      { label:"AT Money",    color:"#3B82F6", bg:"rgba(59,130,246,0.15)",  text:"#3B82F6", short:"AT"  },
};
const STATUSES = {
  settled:{ label:"Settled", color:"#10B981", bg:"rgba(16,185,129,0.15)" },
  pending:{ label:"Pending", color:"#F59E0B", bg:"rgba(245,158,11,0.15)" },
  failed: { label:"Failed",  color:"#EF4444", bg:"rgba(239,68,68,0.15)"  },
};

// ══════════════════════════ STATE & STORAGE ══════════════════════════
let users = JSON.parse(localStorage.getItem("momo_vendors_db")) || {};
let session = null;
let currentNet = "ALL";

function saveDb() { localStorage.setItem("momo_vendors_db", JSON.stringify(users)); }

// ══════════════════════════ UTILS ══════════════════════════
function showToast(msg, type="info") {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${type==="success"?"✓":"ℹ"}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = "fadeOut 0.3s ease forwards";
    setTimeout(()=>toast.remove(), 300);
  }, 4000);
}

function fmtTime(dateStr) { return new Date(dateStr).toLocaleTimeString("en-GH",{hour:"2-digit",minute:"2-digit"}); }
function fmtDate(dateStr) { return new Date(dateStr).toLocaleDateString("en-GH",{month:"short",day:"numeric"}); }
function fmt(n) { return n>=1000?`GH₵${(n/1000).toFixed(1)}k`:`GH₵${n}`; }

// ══════════════════════════ AUTH ══════════════════════════
let authMode = "login";

function switchMode(m) {
  authMode = m;
  document.getElementById("tab-login").classList.toggle("active", m==="login");
  document.getElementById("tab-register").classList.toggle("active", m==="register");
  document.getElementById("register-fields").style.display = m==="register" ? "flex" : "none";
  document.getElementById("auth-btn").textContent = m==="login" ? "Sign in →" : "Create account →";
  document.getElementById("auth-error").classList.remove("show");
}

function doAuth() {
  const user = document.getElementById("inp-username").value.trim();
  const pass = document.getElementById("inp-password").value.trim();
  const err = document.getElementById("auth-error");
  err.classList.remove("show");

  if (!user || !pass) { err.textContent="Fields required."; err.classList.add("show"); return; }

  if (authMode === "register") {
    const biz = document.getElementById("inp-business").value.trim();
    if (!biz) { err.textContent="Business name required."; err.classList.add("show"); return; }
    if (users[user]) { err.textContent="Username taken."; err.classList.add("show"); return; }
    
    users[user] = { username:user, password:pass, business:biz, transactions: [] };
    saveDb();
    showToast("Account created!", "success");
    launchApp(users[user]);
  } else {
    const u = users[user];
    if (!u || u.password !== pass) { err.textContent="Invalid credentials."; err.classList.add("show"); return; }
    showToast("Welcome back!", "success");
    launchApp(u);
  }
}

window.onload = () => {
  const activeUser = localStorage.getItem("momo_active_vendor");
  if(activeUser && users[activeUser]) launchApp(users[activeUser]);
};

// ══════════════════════════ APP ══════════════════════════
function launchApp(u) {
  session = u;
  if(!session.transactions) session.transactions = []; // Safety check
  
  localStorage.setItem("momo_active_vendor", u.username);
  
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("hdr-biz").textContent = u.business;

  renderDashboard();
}

function signOut() {
  session = null;
  localStorage.removeItem("momo_active_vendor");
  document.getElementById("app").style.display = "none";
  document.getElementById("auth-screen").style.display = "flex";
  document.querySelectorAll(".inp").forEach(el => el.value="");
  showToast("Signed out.");
}

function setNet(btn) {
  document.querySelectorAll(".net-btn").forEach(b=>b.className="net-btn");
  currentNet = btn.dataset.net;
  if(currentNet==="ALL") btn.classList.add("active-all");
  else if(currentNet==="MTN") btn.classList.add("active-mtn");
  else if(currentNet==="TELECEL") btn.classList.add("active-tel");
  else if(currentNet==="AT") btn.classList.add("active-at");
  renderDashboard();
}

// ══════════════════════════ DATA ENTRY ══════════════════════════
function openAddModal() {
  document.getElementById("new-phone").value = "";
  document.getElementById("new-name").value = "";
  document.getElementById("new-amt").value = "";
  document.getElementById("new-net").value = "MTN";
  document.getElementById("new-status").value = "settled";
  document.getElementById("add-error").classList.remove("show");
  document.getElementById("add-modal").classList.add("show");
}

function closeAddModal(e) {
  if(e && e.target !== document.getElementById("add-modal")) return;
  document.getElementById("add-modal").classList.remove("show");
}

function saveTransaction() {
  const phone = document.getElementById("new-phone").value.trim();
  const name = document.getElementById("new-name").value.trim() || "Unknown Customer";
  const amt = parseFloat(document.getElementById("new-amt").value);
  const net = document.getElementById("new-net").value;
  const status = document.getElementById("new-status").value;
  const err = document.getElementById("add-error");
  
  if(!phone || isNaN(amt) || amt <= 0) {
    err.textContent = "Please enter a valid phone number and amount.";
    err.classList.add("show");
    return;
  }

  const txn = {
    id: "TX" + Date.now(),
    time: new Date().toISOString(),
    phone, name, amount: amt, network: net, status
  };

  // Add to top of list
  session.transactions.unshift(txn);
  users[session.username] = session;
  saveDb();
  
  closeAddModal();
  showToast("Transaction saved successfully", "success");
  renderDashboard();
}


// ══════════════════════════ RENDER ══════════════════════════
function calcMetrics(txns) {
  const settled = txns.filter(t=>t.status==="settled");
  const total = settled.reduce((s,t)=>s+t.amount,0);
  const failed = txns.filter(t=>t.status==="failed").length;
  const avg = settled.length ? total/settled.length : 0;
  const net={MTN:0,TELECEL:0,AT:0}, netCount={MTN:0,TELECEL:0,AT:0};
  
  settled.forEach(t=>net[t.network]+=t.amount);
  txns.forEach(t=>netCount[t.network]++);
  
  return {total,count:txns.length,failed,avg,net,netCount};
}

function renderDashboard() {
  const allTxns = session.transactions;
  const filtered = currentNet==="ALL" ? allTxns : allTxns.filter(t=>t.network===currentNet);
  const m = calcMetrics(filtered);
  
  renderMetrics(m);
  renderTxns(filtered);
  renderDonut(m);
  renderBarChart(m);
}

function renderMetrics(m) {
  const cards = [
    { label:"Total Settled", val:`GH₵ ${m.total.toLocaleString("en-GH",{minimumFractionDigits:2, maximumFractionDigits:2})}`, subColor:"#10B981" },
    { label:"Total Transactions", val:m.count, subColor:"#8B96B0" },
    { label:"Avg. Ticket Size", val:`GH₵ ${m.avg.toFixed(2)}`, subColor:"#8B96B0" },
    { label:"Failed Payments", val:m.failed, subColor:m.failed>0?"#EF4444":"#10B981" },
  ];
  document.getElementById("metric-grid").innerHTML = cards.map(c=>`
    <div class="metric-card">
      <div class="metric-label">${c.label}</div>
      <div class="metric-val" style="color:${c.subColor}">${c.val}</div>
    </div>
  `).join("");
}

function renderTxns(txns) {
  document.getElementById("txn-count").textContent = `${txns.length} records`;
  const tbody = document.getElementById("txn-body");
  
  if (txns.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No transactions found. Click "Add Transaction" to start recording.</div></td></tr>`;
    return;
  }

  tbody.innerHTML = txns.map(tx=>{
    const net=NETWORKS[tx.network], st=STATUSES[tx.status];
    return `<tr>
      <td>
        <div class="txn-phone">${tx.phone}</div>
        <div class="txn-name">${tx.name}</div>
      </td>
      <td><span class="net-badge" style="background:${net.bg};color:${net.text}">${net.short}</span></td>
      <td class="amt" style="color:${tx.status==='failed'?'#EF4444':'var(--text)'}">${tx.status==='failed'?'—':`GH₵ ${tx.amount.toFixed(2)}`}</td>
      <td><span class="status-badge" style="background:${st.bg};color:${st.color}">${st.label}</span></td>
      <td class="time-cell">
        <div>${fmtDate(tx.time)}</div>
        <div style="font-size:10px; color:var(--text3)">${fmtTime(tx.time)}</div>
      </td>
    </tr>`;
  }).join("");
}

function renderDonut(m) {
  const data = [
    {label:"MTN",    value:m.netCount.MTN,     color:NETWORKS.MTN.color},
    {label:"TELECEL",value:m.netCount.TELECEL,  color:NETWORKS.TELECEL.color},
    {label:"AT",     value:m.netCount.AT,       color:NETWORKS.AT.color},
  ];
  const total = data.reduce((s,d)=>s+d.value,0);
  const svg = document.getElementById("donut-svg");
  const legend = document.getElementById("donut-legend");
  
  if (total === 0) {
    svg.innerHTML = `<circle cx="60" cy="60" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="16"/><text x="60" y="64" text-anchor="middle" font-size="12" fill="#8B96B0">No Data</text>`;
    legend.innerHTML = "";
    return;
  }

  const cx=60,cy=60,r=45,sw=16;
  let cum=0;
  const paths = data.map(d=>{
    const pct=total?d.value/total:0;
    if(pct===0) return "";
    if(pct === 1) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}"/>`;
    
    const sa=cum*2*Math.PI-Math.PI/2, ea=(cum+pct)*2*Math.PI-Math.PI/2;
    cum+=pct;
    const laf=pct>0.5?1:0;
    return `<path d="M ${cx+r*Math.cos(sa)} ${cy+r*Math.sin(sa)} A ${r} ${r} 0 ${laf} 1 ${cx+r*Math.cos(ea)} ${cy+r*Math.sin(ea)}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-linecap="butt"/>`;
  }).join("");

  svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="${sw}"/>${paths}
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="11" fill="#8B96B0">Total</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="16" font-weight="700" fill="#F0F4FF">${total}</text>`;

  legend.innerHTML = data.map(d=>{
    const pct = total ? Math.round((d.value/total)*100) : 0;
    return `<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span class="legend-label">${NETWORKS[d.label]?.label||d.label}</span><span class="legend-pct" style="color:${d.color}">${pct}%</span></div>`;
  }).join("");
}

function renderBarChart(m) {
  const bars = [
    {label:"MTN MoMo", value:m.net.MTN,    color:NETWORKS.MTN.color},
    {label:"Telecel",  value:m.net.TELECEL, color:NETWORKS.TELECEL.color},
    {label:"AT Money", value:m.net.AT,      color:NETWORKS.AT.color},
  ];
  const max = Math.max(...bars.map(b=>b.value), 1);
  document.getElementById("bar-chart").innerHTML = bars.map(b=>`
    <div class="bar-row">
      <span class="bar-label">${b.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${max>0?(b.value/max)*100:0}%;background:${b.color}"></div></div>
      <span class="bar-val" style="color:${b.color}">${fmt(b.value)}</span>
    </div>
  `).join("");
}
</script>
